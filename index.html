<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEBQ AIカウンセラー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kiwi Maru', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-pink-50 min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md text-center mb-6">
        <h1 class="text-2xl font-bold text-pink-600">🌸 心の栄養相談室</h1>
        <p class="text-sm text-pink-400">GPT-4oがあなたの食行動を分析します</p>
    </div>

    <div id="chat-container" class="w-full max-w-md flex-1 glass-card rounded-3xl shadow-xl overflow-hidden flex flex-col border border-pink-100">
        
        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="flex items-end space-x-2">
                <div class="w-8 h-8 rounded-full bg-pink-200 flex items-center justify-center text-lg">🤖</div>
                <div class="bg-white text-gray-700 p-3 rounded-2xl rounded-bl-none shadow-sm max-w-[80%] border border-pink-50 text-sm">
                    こんにちは！今日はどんな気分ですか？<br>少しずつ、いつもの食事について教えてくださいね。
                </div>
            </div>

            <div class="flex items-end justify-end space-x-2">
                <div class="bg-pink-500 text-white p-3 rounded-2xl rounded-br-none shadow-md max-w-[80%] text-sm">
                    ちょっと疲れ気味で、甘いものが止まりません…
                </div>
                <div class="w-8 h-8 rounded-full bg-pink-400 flex items-center justify-center text-white text-xs">私</div>
            </div>
        </div>

        <div class="p-4 bg-white border-t border-pink-50">
            <div class="flex space-x-2">
                <button class="p-2 bg-pink-100 rounded-full hover:bg-pink-200 transition-colors text-pink-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
                <input type="text" id="userInput" placeholder="メッセージを入力..." 
                       class="flex-1 border-none focus:ring-0 text-sm py-2 px-1 outline-none text-gray-600">
                <button onclick="sendMessage()" class="bg-pink-500 text-white px-4 py-2 rounded-full shadow-lg hover:bg-pink-600 active:scale-95 transition-all text-sm font-bold">
                    送信
                </button>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            // 画面にユーザーのメッセージを表示する処理（略）
            console.log("送信内容:", message);
            
            // ここに Logic Apps の URL を入れる
            // const logicAppsUrl = 'YOUR_LOGIC_APPS_ENDPOINT';
            // await fetch(logicAppsUrl, { method: 'POST', body: JSON.stringify({ text: message }) });

            input.value = '';
        }
    </script>
</body>
</html>
