<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>栄養士AI あおい 🌿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f4f8; }
        .chat-container { height: calc(100vh - 180px); }
        .bubble { border-radius: 1.2rem; padding: 0.8rem 1rem; max-width: 85%; line-height: 1.5; }
        .bubble-aoi { background-color: #e0f2f1; color: #004d40; align-self: flex-start; border-bottom-left-radius: 0.2rem; }
        .bubble-user { background-color: #00897b; color: white; align-self: flex-end; border-bottom-right-radius: 0.2rem; }
        .loading-dots span { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="bg-teal-600 text-white p-4 shadow-lg flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🌿</span>
            <h1 class="text-xl font-bold tracking-tight">栄養士AI あおい</h1>
        </div>
        <div class="text-xs bg-teal-700 px-2 py-1 rounded">aoichan App</div>
    </header>

    <main id="chat-window" class="chat-container overflow-y-auto p-4 flex flex-col gap-4">
        <div class="bubble bubble-aoi shadow-sm">
            やっほー！あおいです😊<br>
            今日は何食べたのかな？写真と一緒に今の気分も教えてね！
        </div>
    </main>

    <footer class="bg-white border-t p-4 shadow-inner">
        <div class="max-w-3xl mx-auto space-y-3">
            <div id="preview-container" class="hidden relative inline-block">
                <img id="image-preview" class="w-20 h-20 object-cover rounded-lg border-2 border-teal-500">
                <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs">✕</button>
            </div>

            <div class="flex items-center gap-2">
                <label class="flex-shrink-0 cursor-pointer p-3 bg-gray-100 rounded-full hover:bg-gray-200 transition">
                    <span class="text-xl">📷</span>
                    <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                </label>
                
                <input type="text" id="mood-input" placeholder="今の気分（例：仕事で疲れた〜）" 
                    class="flex-1 bg-gray-50 border border-gray-300 rounded-full px-5 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500">
                
                <button onclick="sendMessage()" id="send-btn" 
                    class="bg-teal-600 hover:bg-teal-700 text-white p-3 rounded-full transition disabled:opacity-50">
                    <span class="text-xl">🚀</span>
                </button>
            </div>
        </div>
    </footer>

    <script>
        const API_URL = 'https://aoichan.azurewebsites.net/api/AoiChat';
        let base64Image = null;

        // 画像選択時の処理
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result;
                document.getElementById('image-preview').src = base64Image;
                document.getElementById('preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        // 画像リセット
        function clearImage() {
            base64Image = null;
            document.getElementById('file-input').value = '';
            document.getElementById('preview-container').classList.add('hidden');
        }

        // メッセージ表示関数
        function addMessage(type, text) {
            const window = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `bubble bubble-${type} shadow-sm`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            window.appendChild(div);
            window.scrollTo({ top: window.scrollHeight, behavior: 'smooth' });
        }

        // 送信メイン処理
        async function sendMessage() {
            const moodInput = document.getElementById('mood-input');
            const btn = document.getElementById('send-btn');
            const mood = moodInput.value;

            if (!mood && !base64Image) return;

            // ユーザーの入力を画面に表示
            addMessage('user', mood || "（写真を送信しました）");
            
            // UIを一時無効化
            btn.disabled = true;
            moodInput.value = '';
            const loadingId = 'loading-' + Date.now();
            addMessage('aoi', `<span id="${loadingId}" class="loading-dots">あおいが考え中<span>.</span><span>.</span><span>.</span></span>`);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mood: mood,
                        image: base64Image,
                        timestamp: new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' })
                    })
                });

                if (!response.ok) throw new Error('通信エラーが発生しました');

                const data = await response.json();
                
                // 「あおい」の返答からJSONタグを除去して表示
                const cleanReply = data.reply.replace(/<FOOD_DATA>[\s\S]*?<\/FOOD_DATA>/, '').trim();
                
                document.getElementById(loadingId).parentElement.innerHTML = cleanReply;
                clearImage();

            } catch (error) {
                document.getElementById(loadingId).parentElement.innerHTML = "ごめんね、うまく繋がらなかったみたい💦 もう一度送ってみて！";
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
