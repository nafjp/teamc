<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>食事きろく</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  body { font-family: 'Noto Sans JP', sans-serif; }

  :root {
    --pink: #FF7BAC;
    --pink-light: #FFD6E7;
    --pink-dark: #E05A8A;
    --bg: #FFF0F5;
    --bubble-user: #FF7BAC;
  }

  body {
    background: var(--bg);
    background-image:
      url("data:image/svg+xml,%3Csvg width='32' height='32' viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M16 3 C16 3 13 8 8 8 C8 14 13 16 16 16 C19 16 24 14 24 8 C19 8 16 3 16 3Z' fill='%23FFD6E7' fill-opacity='0.35'/%3E%3C/svg%3E");
  }

  .bubble-appear { animation: bubbleIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes bubbleIn {
    from { opacity:0; transform:scale(0.72) translateY(8px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }

  .typing-dots { animation: fadeIn 0.18s ease both; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .dot-bounce { display:inline-block; animation:dotBounce 1.1s infinite; }
  .dot-bounce:nth-child(2){animation-delay:.18s}
  .dot-bounce:nth-child(3){animation-delay:.36s}
  @keyframes dotBounce {
    0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)}
  }

  .choice-btn { transition: all .14s ease; cursor:pointer; }
  .choice-btn:active { transform:scale(0.94); }

  .send-btn { transition: transform .12s ease, box-shadow .12s ease; }
  .send-btn:active { transform:scale(0.93); }

  #chat-area::-webkit-scrollbar { width:4px; }
  #chat-area::-webkit-scrollbar-thumb { background:rgba(255,123,172,.3); border-radius:2px; }

  .user-bubble { background: var(--bubble-user); color:#fff; }

  .avatar-wrap {
    width:36px; height:36px; border-radius:50%;
    background: linear-gradient(145deg,#FFD6E7,#FFAECE);
    box-shadow: 0 2px 6px rgba(255,123,172,.4);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; overflow:hidden;
  }

  .submitted-overlay { animation:fadeSlideUp .45s ease both; }
  @keyframes fadeSlideUp {
    from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)}
  }

  header { background: linear-gradient(135deg,#FF7BAC 0%,#FFAECE 100%); }

  input:focus { border-color:#FF7BAC !important; box-shadow:0 0 0 3px rgba(255,123,172,.15); outline:none; }

  .chip-btn {
    background:#fff; border:1.5px solid #FFAECE; color:#D0537A;
    border-radius:999px; padding:6px 14px; font-size:13px;
    transition: all .13s; cursor:pointer;
  }
  .chip-btn:active {
    background:#FF7BAC; border-color:#FF7BAC; color:#fff; transform:scale(0.95);
  }

  .card-btn {
    background:#fff; border:1.5px solid #FFD6E7; border-radius:14px;
    padding:10px 12px; font-size:13px; color:#555; text-align:left;
    transition:all .13s; cursor:pointer; box-shadow:0 1px 4px rgba(255,123,172,.1);
  }
  .card-btn:active { background:#FFF0F8; border-color:#FF7BAC; color:#D0537A; transform:scale(0.96); }

  .json-box {
    background:#1e1e2e; color:#cdd6f4; border-radius:14px; padding:14px;
    font-size:11px; font-family:monospace; white-space:pre-wrap; word-break:break-all;
    max-height:180px; overflow-y:auto; line-height:1.6;
  }
  .json-key { color:#89b4fa; }
  .json-str { color:#a6e3a1; }
  .json-null { color:#fab387; }
  .json-num { color:#f9e2af; }
</style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

<!-- Header -->
<header class="flex items-center gap-3 px-4 py-3 shadow z-10">
  <div class="avatar-wrap" id="header-avatar"></div>
  <div>
    <p class="text-white font-bold text-sm leading-tight">あおい 🌸</p>
    <p class="text-pink-100 text-xs">食事サポートナビ</p>
  </div>
  <div class="ml-auto flex items-center gap-1.5">
    <span class="w-2 h-2 bg-green-300 rounded-full"></span>
    <span class="text-pink-100 text-xs">オンライン</span>
  </div>
</header>

<!-- Date bar -->
<div class="text-center py-2">
  <span class="bg-pink-300/30 text-pink-600 text-xs px-3 py-1 rounded-full" id="date-label"></span>
</div>

<!-- Chat -->
<div id="chat-area" class="flex-1 overflow-y-auto px-3 pb-4 space-y-3"></div>

<!-- Input -->
<div id="input-area" class="bg-white/85 backdrop-blur border-t border-pink-100 px-3 py-2 min-h-[60px]"></div>

<script>
// ── Avatar SVG ──
const AVATAR_SVG = `<svg viewBox="0 0 36 36" width="36" height="36" xmlns="http://www.w3.org/2000/svg">
  <circle cx="18" cy="20" r="13" fill="#FFE4C4"/>
  <ellipse cx="11" cy="22" rx="3.5" ry="2" fill="#FFB0C8" opacity=".55"/>
  <ellipse cx="25" cy="22" rx="3.5" ry="2" fill="#FFB0C8" opacity=".55"/>
  <ellipse cx="13.5" cy="19" rx="2" ry="2.5" fill="#3d2b1f"/>
  <ellipse cx="22.5" cy="19" rx="2" ry="2.5" fill="#3d2b1f"/>
  <circle cx="14.2" cy="18.1" r=".7" fill="#fff"/>
  <circle cx="23.2" cy="18.1" r=".7" fill="#fff"/>
  <path d="M14 24 Q18 27.5 22 24" stroke="#D0537A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <ellipse cx="18" cy="9" rx="13" ry="9" fill="#4a2c2a"/>
  <ellipse cx="18" cy="14" rx="13" ry="5" fill="#5c3530"/>
  <ellipse cx="14" cy="8" rx="3" ry="1.5" fill="#7a4a44" opacity=".6"/>
  <g transform="translate(22,5)">
    <path d="M-3-2 L0 1 L3-2 Z" fill="#FF7BAC"/>
    <path d="M-3 2 L0-1 L3 2 Z" fill="#FF9EC4"/>
    <circle cx="0" cy="0" r="1.2" fill="#fff"/>
  </g>
</svg>`;

document.getElementById('header-avatar').innerHTML = AVATAR_SVG;

// ── State ──
const state = { step: 0, data: {} };

// ── Steps ──
const steps = [
  {
    id: 'patient_id',
    botMsg: 'こんにちは〜！わたしはあおいだよ🌸\nいっしょに食事の記録をつけていこうね♡\n\nまず、患者IDを入力してね！',
    type: 'text',
    placeholder: '例: 20030',
    validate: v => /^\d+$/.test(v.trim()) ? null : '数字で入力してね🥺',
  },
  {
    id: 'meal_time',
    botMsg: 'ありがと〜！✨\n食事した日時を教えてね🍽️',
    type: 'datetime',
  },
  {
    id: 'meal_type',
    botMsg: 'どの食事だった？🌞',
    type: 'choices',
    choices: ['🌅 朝食', '☀️ 昼食', '🌙 夕食', '🍪 間食'],
    valueMap: { '🌅 朝食':'朝食', '☀️ 昼食':'昼食', '🌙 夕食':'夕食', '🍪 間食':'間食' },
  },
  {
    id: 'place',
    botMsg: 'どこで食べたか教えてね🏠',
    type: 'choices',
    choices: ['🏠 自宅', '🍴 外食', '💼 職場', '📍 その他'],
    valueMap: { '🏠 自宅':'自宅', '🍴 外食':'外食', '💼 職場':'職場', '📍 その他':'その他' },
  },
  {
    id: 'emotion_tag',
    botMsg: '食べたときの気持ちや理由は？\n正直に教えてくれると嬉しいな🫶',
    type: 'choices',
    choices: [
      '😋 お腹が空いたから',
      '⏰ 食べないといけない時間',
      '😤 なんとなくイライラして',
      '😢 悲しくて・寂しくて',
      '🥰 好きな人と一緒に食べすぎた',
      '👃 美味しそうな匂いがして',
      '🤷 特に理由はない'
    ],
    valueMap: {
      '😋 お腹が空いたから':'お腹が空いたから',
      '⏰ 食べないといけない時間':'食べないといけない時間だから',
      '😤 なんとなくイライラして':'なんとなくイライラして',
      '😢 悲しくて・寂しくて':'悲しくて・寂しくて',
      '🥰 好きな人と一緒に食べすぎた':'好きな人と一緒に食べすぎた',
      '👃 美味しそうな匂いがして':'美味しそうな匂いがして',
      '🤷 特に理由はない':'特に理由はない'
    },
  },
  {
    id: 'debq_type_inferred',
    botMsg: '食べ方のパターンを選んでね💭',
    type: 'choices',
    choices: ['🚫 制限的', '💗 感情的', '👀 外発的', '❓ 未分類'],
    valueMap: { '🚫 制限的':'制限的', '💗 感情的':'感情的', '👀 外発的':'外発的', '❓ 未分類':'未分類' },
  },
  {
    id: 'food_staple',
    botMsg: '主食は何だった？🍚\nボタンで選ぶか自分で入力してね！',
    type: 'choices_or_text',
    choices: ['ごはん（大）', 'ごはん（中）', 'うどん', 'ラーメン', 'パン', 'せんべい', 'カレーライス', 'なし（欠食）'],
    placeholder: '例: そば、パスタ など',
  },
  {
    id: 'food_main',
    botMsg: 'メインのおかずは？🍳\nなければそのまま送ってね！',
    type: 'text_optional',
    placeholder: '例: 焼き魚、唐揚げ など',
  },
  {
    id: 'food_side',
    botMsg: '副菜・サイドは？🥗\n複数あればカンマ区切りで〜',
    type: 'text_optional',
    placeholder: '例: 野菜炒め、味噌汁 など',
  },
  {
    id: 'food_drink',
    botMsg: '飲み物は何を飲んだ？☕',
    type: 'choices_or_text',
    choices: ['水', 'お茶', 'コーヒー', '缶コーヒー', '野菜ジュース', '炭酸飲料', 'なし'],
    placeholder: '例: ほうじ茶、牛乳 など',
  },
  {
    id: 'food_dessert',
    botMsg: 'デザートやお菓子は？🍰\nなければ空欄でOKだよ！',
    type: 'text_optional',
    placeholder: '例: アイス1個、チョコ2粒 など',
  },
  {
    id: 'free_text',
    botMsg: '最後に！食事の感想や\n気づいたことがあれば教えてね🌼\nなければ空欄でOK！',
    type: 'text_optional',
    placeholder: '例: 食べすぎちゃった、外食しかできなかった...',
  },
];

// ── Helpers ──
function nowStr() {
  return new Date().toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
}
function setDateLabel() {
  document.getElementById('date-label').textContent =
    new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}
function scrollBottom() {
  const el = document.getElementById('chat-area');
  setTimeout(() => el.scrollTop = el.scrollHeight, 40);
}

const SEND_ICON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;

function addBotBubble(text, delay = 0) {
  return new Promise(resolve => {
    const typing = document.createElement('div');
    typing.className = 'flex items-end gap-2 typing-dots';
    typing.innerHTML = `
      <div class="avatar-wrap">${AVATAR_SVG}</div>
      <div class="bg-white rounded-2xl rounded-bl-sm px-4 py-2 shadow-sm text-pink-400 text-sm border border-pink-100">
        <span class="dot-bounce">●</span><span class="dot-bounce"> ●</span><span class="dot-bounce"> ●</span>
      </div>`;
    document.getElementById('chat-area').appendChild(typing);
    scrollBottom();

    const wait = delay + 550 + Math.min(text.length * 13, 700);
    setTimeout(() => {
      typing.remove();
      const lines = text.split('\n').map(l => `<span class="block">${l || '&nbsp;'}</span>`).join('');
      const bubble = document.createElement('div');
      bubble.className = 'flex items-end gap-2 bubble-appear';
      bubble.innerHTML = `
        <div class="avatar-wrap">${AVATAR_SVG}</div>
        <div>
          <div class="bg-white rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm text-gray-700 text-sm leading-relaxed max-w-xs border border-pink-100">${lines}</div>
          <p class="text-xs text-pink-300 mt-1 ml-1">${nowStr()}</p>
        </div>`;
      document.getElementById('chat-area').appendChild(bubble);
      scrollBottom();
      resolve();
    }, wait);
  });
}

function addUserBubble(text) {
  const bubble = document.createElement('div');
  bubble.className = 'flex justify-end items-end bubble-appear';
  bubble.innerHTML = `
    <div>
      <div class="user-bubble rounded-2xl rounded-br-sm px-4 py-3 shadow-sm text-sm leading-relaxed max-w-xs">${text}</div>
      <p class="text-xs text-pink-300 mt-1 text-right mr-1">既読 ${nowStr()}</p>
    </div>`;
  document.getElementById('chat-area').appendChild(bubble);
  scrollBottom();
}

// ── Render input ──
function renderInput(step) {
  const area = document.getElementById('input-area');
  area.innerHTML = '';
  if (!step) return;

  if (step.type === 'text' || step.type === 'text_optional') {
    const optional = step.type === 'text_optional';
    area.innerHTML = `
      <div class="flex gap-2 items-center">
        <input type="text" id="text-input"
          class="flex-1 rounded-full border-2 border-pink-200 bg-white px-4 py-2 text-sm transition"
          placeholder="${step.placeholder || ''}" />
        <button id="send-btn" class="send-btn w-10 h-10 rounded-full flex items-center justify-center shadow-md text-white"
          style="background:linear-gradient(135deg,#FF7BAC,#FF9EC4)">${SEND_ICON}</button>
      </div>
      ${optional ? '<p class="text-xs text-pink-300 text-center mt-1">空欄のまま送信でスキップできるよ🌸</p>' : ''}`;
    const inp = document.getElementById('text-input');
    inp.focus();
    const submit = () => {
      const val = inp.value.trim();
      if (!optional && step.validate) {
        const err = step.validate(val);
        if (err) { inp.style.borderColor='#f87171'; inp.placeholder=err; inp.value=''; return; }
      }
      handleAnswer(step, val || (optional ? '' : null));
    };
    document.getElementById('send-btn').addEventListener('click', submit);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

  } else if (step.type === 'datetime') {
    const n = new Date();
    const local = new Date(n.getTime() - n.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    area.innerHTML = `
      <div class="flex gap-2 items-center">
        <input type="datetime-local" id="dt-input"
          class="flex-1 rounded-full border-2 border-pink-200 bg-white px-4 py-2 text-sm transition"
          value="${local}" />
        <button id="send-btn" class="send-btn w-10 h-10 rounded-full flex items-center justify-center shadow-md text-white"
          style="background:linear-gradient(135deg,#FF7BAC,#FF9EC4)">${SEND_ICON}</button>
      </div>`;
    document.getElementById('send-btn').addEventListener('click', () => {
      const val = document.getElementById('dt-input').value;
      if (!val) return;
      handleAnswer(step, val);
    });

  } else if (step.type === 'choices') {
    area.innerHTML = `<div class="grid grid-cols-2 gap-2">
      ${step.choices.map(c => `<button class="card-btn choice-btn" data-val="${c}">${c}</button>`).join('')}
    </div>`;
    area.querySelectorAll('.choice-btn').forEach(btn =>
      btn.addEventListener('click', () => handleAnswer(step, btn.dataset.val))
    );

  } else if (step.type === 'choices_or_text') {
    area.innerHTML = `
      <div class="flex flex-wrap gap-1.5 mb-2">
        ${step.choices.map(c => `<button class="chip-btn choice-btn" data-val="${c}">${c}</button>`).join('')}
      </div>
      <div class="flex gap-2 items-center">
        <input type="text" id="text-input"
          class="flex-1 rounded-full border-2 border-pink-200 bg-white px-4 py-2 text-sm transition"
          placeholder="${step.placeholder || ''}" />
        <button id="send-btn" class="send-btn w-10 h-10 rounded-full flex items-center justify-center shadow-md text-white"
          style="background:linear-gradient(135deg,#FF7BAC,#FF9EC4)">${SEND_ICON}</button>
      </div>
      <p class="text-xs text-pink-300 text-center mt-1">ボタンで選ぶか自由入力してね🌸</p>`;
    area.querySelectorAll('.choice-btn').forEach(btn =>
      btn.addEventListener('click', () => handleAnswer(step, btn.dataset.val))
    );
    const inp = document.getElementById('text-input');
    document.getElementById('send-btn').addEventListener('click', () => handleAnswer(step, inp.value.trim()));
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') handleAnswer(step, inp.value.trim()); });
  }
}

// ── Handle answer ──
async function handleAnswer(step, value) {
  if (value === null) return;
  document.getElementById('input-area').innerHTML = '';

  // Resolve display label vs stored value
  const stored = (step.valueMap && step.valueMap[value]) ? step.valueMap[value] : value;
  addUserBubble(value || '（スキップ）');
  state.data[step.id] = stored || null;
  state.step++;

  if (state.step < steps.length) {
    const next = steps[state.step];
    await addBotBubble(next.botMsg);
    renderInput(next);
  } else {
    await showConfirm();
  }
}

// ── Build JSON ──
function buildPayload() {
  return {
    patient_id: state.data.patient_id ? Number(state.data.patient_id) : null,
    sent_at: new Date().toISOString(),
    meal_time: state.data.meal_time || null,
    meal_type: state.data.meal_type || null,
    place: state.data.place || null,
    emotion_tag: state.data.emotion_tag || null,
    debq_type_inferred: state.data.debq_type_inferred || null,
    food_staple: state.data.food_staple || null,
    food_main: state.data.food_main || null,
    food_side: state.data.food_side || null,
    food_drink: state.data.food_drink || null,
    food_dessert: state.data.food_dessert || null,
    free_text: state.data.free_text || null,
  };
}

// ── Syntax-highlight JSON ──
function highlightJSON(obj) {
  return JSON.stringify(obj, null, 2)
    .replace(/("[\w_]+")\s*:/g, '<span class="json-key">$1</span>:')
    .replace(/:\s*(".*?")/g, ': <span class="json-str">$1</span>')
    .replace(/:\s*(null)/g, ': <span class="json-null">$1</span>')
    .replace(/:\s*(\d+)/g, ': <span class="json-num">$1</span>');
}

// ── Confirm ──
async function showConfirm() {
  const labels = {
    patient_id:'患者ID', meal_time:'食事日時', meal_type:'食事種別',
    place:'場所', emotion_tag:'感情タグ', debq_type_inferred:'DEBQタイプ',
    food_staple:'主食', food_main:'メイン', food_side:'副菜',
    food_drink:'飲み物', food_dessert:'デザート', free_text:'メモ'
  };
  const rows = Object.entries(state.data)
    .map(([k,v]) => `<tr>
      <td class="text-pink-400 pr-3 py-0.5 text-xs whitespace-nowrap">${labels[k]||k}</td>
      <td class="text-gray-700 text-xs font-medium">${v || '<span class="text-gray-300">—</span>'}</td>
    </tr>`).join('');

  await addBotBubble('確認してね〜！✨\n内容がOKなら「送信する」を押してね💌');

  const area = document.getElementById('input-area');
  area.innerHTML = `
    <div class="bg-white rounded-2xl shadow-sm border border-pink-100 p-3 mb-2">
      <p class="text-xs font-bold text-pink-400 mb-2 border-b border-pink-50 pb-1">📋 入力内容の確認</p>
      <table class="w-full">${rows}</table>
    </div>
    <div class="flex gap-2">
      <button id="btn-back" class="flex-1 bg-gray-100 text-gray-500 rounded-full py-2 text-sm font-medium border border-gray-200">やり直す</button>
      <button id="btn-submit" class="text-white rounded-full py-2 px-6 text-sm font-bold shadow-md" style="flex:2;background:linear-gradient(135deg,#FF7BAC,#FF9EC4)">✓ 送信する 💌</button>
    </div>`;

  document.getElementById('btn-submit').addEventListener('click', submitData);
  document.getElementById('btn-back').addEventListener('click', () => {
    state.step = 0; state.data = {};
    document.getElementById('chat-area').innerHTML = '';
    document.getElementById('input-area').innerHTML = '';
    startFlow();
  });
}

// ── Submit JSON ──
async function submitData() {
  document.getElementById('input-area').innerHTML = '';
  const payload = buildPayload();

  // ── POST to your endpoint ──
  // try {
  //   const res = await fetch('/api/meals', {
  //     method: 'POST',
  //     headers: { 'Content-Type': 'application/json' },
  //     body: JSON.stringify(payload)
  //   });
  //   const result = await res.json();
  //   console.log('Server response:', result);
  // } catch(err) {
  //   console.error('送信エラー:', err);
  // }

  console.log('📦 JSON payload:\n', JSON.stringify(payload, null, 2));

  await addBotBubble('送信完了だよ〜！💌✨\nちゃんと記録できたよ！えらい！🌸\n\n次のお食事もきろくしようね🍵💕');

  // Show highlighted JSON in chat
  const jsonBubble = document.createElement('div');
  jsonBubble.className = 'flex items-end gap-2 bubble-appear';
  jsonBubble.innerHTML = `
    <div class="avatar-wrap">${AVATAR_SVG}</div>
    <div style="max-width:85%">
      <p class="text-xs text-pink-400 mb-1 ml-1">📦 送信したJSON</p>
      <div class="json-box">${highlightJSON(payload)}</div>
      <p class="text-xs text-pink-300 mt-1 ml-1">${nowStr()}</p>
    </div>`;
  document.getElementById('chat-area').appendChild(jsonBubble);
  scrollBottom();

  document.getElementById('input-area').innerHTML = `
    <div class="submitted-overlay text-center py-3">
      <p class="text-3xl mb-1">🎉</p>
      <p class="text-sm font-bold" style="color:#D0537A">記録完了！お疲れさま〜🌸</p>
      <button onclick="location.reload()"
        class="mt-3 text-white rounded-full px-6 py-2 text-sm font-bold shadow-md"
        style="background:linear-gradient(135deg,#FF7BAC,#FF9EC4)">もう一件記録する 💌</button>
    </div>`;
}

// ── Start ──
async function startFlow() {
  setDateLabel();
  await addBotBubble(steps[0].botMsg);
  renderInput(steps[0]);
}

startFlow();
</script>
