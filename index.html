<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>栄養士AI あおい</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-bubble { border-radius: 20px; padding: 12px 16px; max-width: 80%; }
        .bg-aoi { background-color: #E0F2F1; } /* あおいちゃんのイメージカラー */
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <header class="bg-teal-500 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-lg font-bold">栄養士AI あおい 🌿</h1>
        <span class="text-xs">Online</span>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="chat-bubble bg-aoi self-start text-gray-800 shadow-sm">
            やっほー！あおいです😊<br>今日の食事を教えてね。写真があると嬉しいな！
        </div>
    </main>

    <footer class="bg-white p-4 border-t shadow-inner">
        <div class="flex flex-col space-y-2">
            <img id="preview" class="hidden w-24 h-24 object-cover rounded-lg border">
            
            <div class="flex items-center space-x-2">
                <label class="cursor-pointer bg-gray-200 p-2 rounded-full hover:bg-gray-300">
                    📷
                    <input type="file" id="image-input" accept="image/*" class="hidden" onchange="previewImage(event)">
                </label>
                <input type="text" id="mood-input" placeholder="今の気分や食事のきっかけは？" 
                       class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400">
                <button onclick="sendMessage()" id="send-btn" 
                        class="bg-teal-500 text-white px-6 py-2 rounded-full font-bold hover:bg-teal-600 transition">
                    送信
                </button>
            </div>
            <p class="text-[10px] text-center text-gray-400">※時刻は自動的に送信されます</p>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        let selectedImageBase64 = null;

        // 画像プレビュー処理
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedImageBase64 = e.target.result;
                    const preview = document.getElementById('preview');
                    preview.src = selectedImageBase64;
                    preview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        // メッセージ送信
        async function sendMessage() {
            const moodInput = document.getElementById('mood-input');
            const mood = moodInput.value;
            const now = new Date().toISOString(); // 時刻を取得

            if (!mood && !selectedImageBase64) return;

            // ユーザー側の表示
            appendMessage('user', mood || '（写真を送ったよ）');

            // 送信ボタンの無効化
            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            btn.innerText = "分析中...";

            try {
                // Azure Functions (API) へのリクエスト
                const response = await fetch('YOUR_AZURE_FUNCTION_URL_HERE', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mood: mood,
                        image: selectedImageBase64,
                        timestamp: now
                    })
                });

                const data = await response.json();
                
                // あおいの返答を表示 (JSON部分を除去してテキストのみ表示)
                const cleanText = data.reply.replace(/<FOOD_DATA>[\s\S]*?<\/FOOD_DATA>/, '').trim();
                appendMessage('aoi', cleanText);

                // JSONデータが埋め込まれていれば、内部的に処理（DEBQ分析用）
                const foodJsonMatch = data.reply.match(/<FOOD_DATA>([\s\S]*?)<\/FOOD_DATA>/);
                if (foodJsonMatch) {
                    const foodData = JSON.parse(foodJsonMatch[1]);
                    console.log("DEBQ分析用データ取得:", foodData);
                    // ここでローカルDBに保存したり、UIに反映させたりする
                }

            } catch (error) {
                appendMessage('aoi', 'ごめん！ちょっと通信エラーかも。もう一回送ってみて💦');
            } finally {
                btn.disabled = false;
                btn.innerText = "送信";
                moodInput.value = '';
                document.getElementById('preview').classList.add('hidden');
                selectedImageBase64 = null;
            }
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `chat-bubble shadow-sm ${sender === 'user' ? 'bg-white self-end ml-auto text-gray-800' : 'bg-aoi self-start text-gray-800'}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
